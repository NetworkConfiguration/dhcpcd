name: Build
permissions:
  contents: read

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CC: clang

jobs:
  # macos is a good platform as we know it ships with a sanitizer we can use
  macos:
    strategy:
      matrix:
        os: [ macos-26 ]
        args:
          - --sanitize
          - --disable-ipv4
          - --disable-arp
          - --disable-ipv4ll
          - --disable-ipv6
          - --disable-dhcp6
        cppflags:
          -
          - -DSMALL
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Configure
      run: CPPFLAGS="${{ matrix.cppflags }}" ./configure ${{ matrix.args }}

    - name: Build
      run: make

    - name: Tests
      run: make tests

  ubuntu:
    strategy:
      matrix:
        os: [ ubuntu-latest, ubuntu-22.04 ]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Install libudev-dev
      run: sudo apt install -y libudev-dev

    - uses: actions/checkout@v6
    
    - name: Configure
      run: ./configure

    - name: Build
      run: make

    - name: Tests
      run: make tests

